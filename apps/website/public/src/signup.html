<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign up - ColdVoice</title>
    <link rel="canonical" href="https://coldvoice.vercel.app/signup" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23111'/%3E%3Cpath d='M10 17h3v5h-3zm5-9h3v14h-3zm5 5h3v9h-3z' fill='white'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="auth-page">
    <header class="nav">
      <a class="brand" href="./"><span class="logo-cold">Cold</span><span class="logo-work">Voice</span></a>
      <nav class="nav-links" aria-label="Primary">
        <a href="./#download">Download</a>
        <a class="nav-cta" href="./login.html">Log in</a>
      </nav>
    </header>

    <main class="auth-shell">
      <section class="auth-copy">
        <p class="eyebrow">Start with ColdVoice</p>
        <h1>Create an account for the desktop download flow.</h1>
        <p>The account layer uses Supabase email/password auth. The desktop app remains local-first.</p>
      </section>

      <form class="auth-card" data-auth-form="signup">
        <h2>Sign up</h2>
        <label>Email<input name="email" type="email" autocomplete="email" required /></label>
        <label>Password<input name="password" type="password" autocomplete="new-password" required minlength="6" /></label>
        <button class="btn btn-primary" type="submit">Create account</button>
        <p class="auth-status" data-auth-status></p>
        <a href="./login.html">Already have an account?</a>
      </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
    <script src="./auth.js"></script>
  </body>
</html>
