<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
    <title>ColdVoice</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <nav class="sidebar">
        <div class="brand"><span class="brand-mark">CV</span> ColdVoice</div>
        <div class="nav-group">
          <button class="nav-item active" data-route="home" data-icon="home">Home</button>
          <button class="nav-item" data-route="insights" data-icon="insights">Insights</button>
          <button class="nav-item" data-route="dictionary" data-icon="dictionary">Dictionary</button>
          <button class="nav-item" data-route="snippets" data-icon="snippets">Snippets</button>
          <button class="nav-item" data-route="settings" data-icon="settings">Settings</button>
          <button class="nav-item" data-route="account" data-icon="account">Account</button>
        </div>
        <div class="sidebar-foot" id="conn-foot">
          <span class="dot-online" id="conn-dot"></span> <span id="conn-label">Private · on-device</span>
        </div>
      </nav>
      <main id="view" class="view"></main>
    </div>
    <div id="modal-root"></div>
    <script src="app.js"></script>
  </body>
</html>
